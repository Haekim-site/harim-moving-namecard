<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harim Oh</title>
<style>
  @font-face {
    font-family: 'Andale Mono';
    src: url('AndaleMono.ttf') format('truetype');
    font-display: swap;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    color: #000;
    font-family: 'Andale Mono', 'Courier New', Courier, monospace;
    background: transparent;
  }
  body { height: 300vh; }

  .paper-bg {
    position: fixed;
    inset: 0;
    background: #fff url('paper.jpg') center/cover no-repeat;
    z-index: 0;
    pointer-events: none;
  }

  /* The card frame holds all the moving elements. In landscape it fills viewport.
     In portrait mobile it is rotated 90deg so the design appears horizontal. */
  .card {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    z-index: 1;
  }

  .corner {
    position: absolute;
    will-change: transform;
    line-height: 0;
  }
  .corner a { display: block; line-height: 0; }
  .corner img { display: block; height: auto; user-select: none; -webkit-user-drag: none; }

  #tl img { width: 100px; }
  #tr img { width: 61px;  }
  #bl img { width: 159px; }
  #br img { width: 158px; }

  /* corners are positioned in % so they follow the card's actual size (works after rotation) */
  #tl { top: 6%;  left: 6%; }
  #tr { top: calc(6% + 12px); left: 6%; transform: translateX(98px); }
  #bl { bottom: 6%; left: 6%; }
  #br { bottom: 6%; right: 6%; }

  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    font-family: 'Andale Mono', 'Courier New', Courier, monospace;
    font-size: 13px;
    line-height: 2;
    opacity: 0;
    letter-spacing: 0.05em;
  }

  .hint {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: #bbb;
    letter-spacing: 0.3em;
    pointer-events: none;
    font-family: 'Andale Mono', 'Courier New', Courier, monospace;
    z-index: 2;
  }

  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #000;
    color: #fff;
    padding: 8px 14px;
    font-family: 'Andale Mono', 'Courier New', Courier, monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 10;
  }
  .toast.show { opacity: 1; }

  /* portrait mobile: rotate the card frame 90deg, swap dimensions */
  @media (max-width: 820px) and (orientation: portrait) {
    .card {
      width: 100vh;
      height: 100vw;
      top: 50%;
      left: 50%;
      inset: auto;
      transform: translate(-50%, -50%) rotate(90deg);
      transform-origin: center center;
    }
    .hint { display: none; }
  }
</style>
</head>
<body>
  <div class="paper-bg"></div>
  <div class="card" id="card">
    <div class="corner" id="tl">
      <img src="name.svg" alt="Harim Oh 오하림 吳河林">
    </div>
    <div class="corner" id="tr">
      <a href="https://instagram.com/55hio" target="_blank" rel="noopener">
        <img src="instagram.svg" alt="@55hio">
      </a>
    </div>
    <div class="corner" id="bl">
      <a href="#" id="mail">
        <img src="email.svg" alt="55hio@naver.com">
      </a>
    </div>
    <div class="corner" id="br">
      <a href="tel:+821066773199">
        <img src="phone.svg" alt="82 10 6677 3199">
      </a>
    </div>

    <div class="center" id="center"></div>
  </div>

  <div class="hint" id="hint">SCROLL ↓</div>
  <div class="toast" id="toast">COPIED</div>

<script>
  const card = document.getElementById('card');
  const tl = document.getElementById('tl');
  const tr = document.getElementById('tr');
  const bl = document.getElementById('bl');
  const br = document.getElementById('br');
  const center = document.getElementById('center');
  const hint = document.getElementById('hint');
  const toast = document.getElementById('toast');

  // Each corner's "spread" position is its CSS-natural location (top:6% etc).
  // The cluster animation computes a target offset toward the center of the CARD
  // (not the viewport), so it works whether card is rotated or not.
  function update() {
    const max = Math.max(1, document.body.scrollHeight - window.innerHeight);
    const p = Math.min(1, Math.max(0, window.scrollY / max));
    const e = p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p + 2, 2)/2;

    // Use card's own dimensions, not window (matters when rotated on mobile)
    const cw = card.clientWidth;
    const ch = card.clientHeight;
    const cx = cw / 2;
    const cy = ch / 2;

    const layout = {
      tl: { w: 100, h: 32, x: 0,  y: 0  },
      tr: { w: 61,  h: 10, x: 98, y: 12 },
      bl: { w: 159, h: 12, x: 0,  y: 38 },
      br: { w: 158, h: 12, x: 0,  y: 56 },
    };
    const blockW = 159;
    const blockH = 68;
    const anchorX = cx - blockW/2;
    const anchorY = cy - blockH/2;

    const k = 1 - e;
    [['tl', tl], ['tr', tr], ['bl', bl], ['br', br]].forEach(([key, el]) => {
      const L = layout[key];
      const targetCx = anchorX + L.x + L.w/2;
      const targetCy = anchorY + L.y + L.h/2;

      // For tr we use a CSS translateX(98px); separate from JS transform.
      // To keep things simple, ignore CSS transform when computing baseCx for tr;
      // just use offsetLeft + offsetWidth/2 + the 98 nudge for tr only.
      let baseCx = el.offsetLeft + el.offsetWidth/2;
      let baseCy = el.offsetTop + el.offsetHeight/2;
      if (key === 'tr') baseCx += 98;

      const dx = (targetCx - baseCx) * k;
      const dy = (targetCy - baseCy) * k;
      const baseTransform = (key === 'tr') ? 'translateX(98px) ' : '';
      el.style.transform = baseTransform + `translate(${dx}px, ${dy}px)`;
    });

    center.style.opacity = e;
    hint.style.opacity = 1 - e;
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  fetch('data.json?t=' + Date.now())
    .then(r => r.ok ? r.json() : { text: '' })
    .then(d => {
      const text = (d.text || '').trim();
      center.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');
    })
    .catch(() => {});

  window.addEventListener('scroll', update, { passive: true });
  window.addEventListener('resize', update);
  window.addEventListener('orientationchange', () => setTimeout(update, 100));
  window.addEventListener('load', update);
  update();

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 1200);
  }

  document.getElementById('mail').addEventListener('click', async (ev) => {
    ev.preventDefault();
    const email = '55hio@naver.com';
    try {
      await navigator.clipboard.writeText(email);
    } catch {
      const ta = document.createElement('textarea');
      ta.value = email; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); ta.remove();
    }
    showToast('COPIED  ' + email);
  });
</script>
</body>
</html>
